      <circle cx="0" cy="0" r="12" />
      <path d="M-12 0H12" />
      <path d="M0 -12V12" />
      <path d="M-10 -5C-6 -8 6 -8 10 -5" />
      <path d="M-10 5C-6 8 6 8 10 5" />
      <path d="M-6 -11C-9 -6 -9 6 -6 11" />
      <path d="M6 -11C9 -6 9 6 6 11" />
    </g>

    <text x="78" y="35" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="0.2">Site vitrine</text>
  </g>
</svg>
