<svg xmlns="http://www.w3.org/2000/svg" width="360" height="56" viewBox="0 0 360 56" role="img" aria-label="Site vitrine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#62B932" />
      <stop offset="100%" stop-color="#4FA327" />
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DB02F" />
      <stop offset="100%" stop-color="#449225" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.35" />
